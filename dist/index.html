<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey Form</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <h2 class="header__title">
        <a href="index.html" class="header__link">danielNelsonPresents</a>
      </h2>
    </header>
    <!-- Article -->
    <div class="container">
      <article class="article">
        <h1 class="article__heading" id="title">
          freeCodeCamp's Survey Form Project
        </h1>
        <p class="article__description" id="description">
          <a
            href="https://www.linkedin.com/in/daniel-nelson-9151a6212/"
            target="_blank"
            >Daniel Nelson's</a
          >
          take on
          <a
            href="https://www.freecodecamp.org/learn/2022/responsive-web-design/build-a-survey-form-project/build-a-survey-form"
            target="_blank"
            >freeCodeCamp's Survey Form</a
          >.
        </p>
      </article>
    </div>
    <!-- Form -->
    <section class="form">
      <form action="#" id="survey-form">
        <!-- 1st Fieldset -->
        <fieldset class="form__fieldset">
          <label for="first-name"
            >First Name:
            <input
              type="text"
              id="first-name"
              name="firstName"
              placeholder="Enter Your First Name"
              required
          /></label>
          <label for="last-name"
            >Last Name:
            <input
              type="text"
              id="last-name"
              name="lasttName"
              placeholder="Enter Your Last Name"
              required
          /></label>
          <label for="email"
            >Email:
            <input
              type="email"
              id="email"
              name="userEmail"
              placeholder="Enter Your Email"
              required
          /></label>
          <label for="age"
            >Age <span class="form__optional">(optional)</span>
            <input
              type="number"
              id="age"
              name="userAge"
              placeholder="Enter Your Age"
              min="13"
              max="120"
          /></label>
        </fieldset>
        <!-- 2nd Fieldset -->
        <fieldset class="form__fieldset">
          <p class="form__text">
            Would you recommend freeCodeCamp to a friend?
          </p>
          <div>
            <label for="definitely" class="radio">
              <input
                type="radio"
                id="definitely"
                name="userRecommendation"
                value="Definitely"
                checked
              />Definitely</label
            >
          </div>
          <div>
            <label for="maybe" class="radio">
              <input
                type="radio"
                id="maybe"
                name="userRecommendation"
                value="Maybe"
              />Maybe</label
            >
          </div>
          <div>
            <label for="not-sure" class="radio">
              <input
                type="radio"
                id="not-sure"
                name="userRecommendation"
                value="Not Sure"
              />Not Sure</label
            >
          </div>
          <p class="form__text">
            What is your favorite feature of freeCodeCamp?
          </p>
          <select name="favoriteFeature" id="feature">
            <option value="">Select an option</option>
            <option value="Challenges">Challenges</option>
            <option value="Projects">Projects</option>
            <option value="Community">Community</option>
            <option value="Open Source">Open Source</option>
          </select>
        </fieldset>
        <!-- 3rd Fieldset -->
        <fieldset class="form__fieldset">
          <p class="form__text">
            What would you like to see imrpoved?
            <span class="form__optional">(Check all that apply)</span>
          </p>
          <div>
            <label
              ><input type="checkbox" value="Front-end Projects" /> Front-end
              Projects</label
            >
          </div>
          <div>
            <label
              ><input type="checkbox" value="Back-end Projects" /> Back-end
              Projects</label
            >
          </div>
          <div>
            <label
              ><input type="checkbox" value="Data Visualization" /> Data
              Visualization</label
            >
          </div>
          <div>
            <label
              ><input type="checkbox" value="Challenges" /> Challenges</label
            >
          </div>
          <div>
            <label
              ><input type="checkbox" value="Open Source Community" /> Open
              Source Community</label
            >
          </div>
          <div>
            <label
              ><input type="checkbox" value="Gitter help rooms" /> Gitter help
              rooms</label
            >
          </div>
          <div>
            <label><input type="checkbox" value="Videos" /> Videos</label>
          </div>
          <div>
            <label
              ><input type="checkbox" value="City Meetups" /> City
              Meetups</label
            >
          </div>
          <div>
            <label><input type="checkbox" value="Wiki" /> Wiki</label>
          </div>
          <div>
            <label><input type="checkbox" value="Forum" /> Forum</label>
          </div>
          <div>
            <label
              ><input type="checkbox" value="Additional Courses" /> Additional
              Courses</label
            >
          </div>
          <p class="form__text">Any comments or suggestions?</p>
          <textarea
            name="userCommennts"
            id="comments"
            cols="30"
            rows="10"
            placeholder="Enter your comment here..."
          ></textarea>
        </fieldset>
        <!-- Submit -->
        <input type="submit" value="Submit" />
      </form>
    </section>
    <!-- Footer -->
    <footer></footer>
  </body>
</html>
