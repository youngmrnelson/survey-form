<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey Form</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <h2 class="header__title">
        <a href="index.html" class="header__link">danielNelsonPresents</a>
      </h2>
    </header>
    <!-- Article -->
    <div class="container">
      <article class="article">
        <h1 class="article__heading" id="title">
          freeCodeCamp's Survey Form Project
        </h1>
        <p class="article__description" id="description">
          <a
            href="https://www.linkedin.com/in/daniel-nelson-9151a6212/"
            target="_blank"
            >Daniel Nelson's</a
          >
          take on
          <a
            href="https://www.freecodecamp.org/learn/2022/responsive-web-design/build-a-survey-form-project/build-a-survey-form"
            target="_blank"
            >freeCodeCamp's Survey Form</a
          >.
        </p>
      </article>
    </div>
    <!-- Form -->
    <section class="form">
      <form action="#" id="survey-form">
        <fieldset class="form__fieldset">
          <label for="first-name"
            >First Name:
            <input
              type="text"
              id="first-name"
              name="firstName"
              placeholder="Enter Your First Name"
              required
          /></label>
          <label for="last-name"
            >Last Name:
            <input
              type="text"
              id="last-name"
              name="lasttName"
              placeholder="Enter Your Last Name"
              required
          /></label>
          <label for="email"
            >Email:
            <input
              type="email"
              id="email"
              name="userEmail"
              placeholder="Enter Your Email"
              required
          /></label>
          <label for="age"
            >Age <span class="form__optional">(optional)</span>
            <input
              type="number"
              id="age"
              name="userAge"
              placeholder="Enter Your Age"
              min="13"
              max="120"
          /></label>
        </fieldset>
        <fieldset class="form__fieldset"></fieldset>
        <fieldset class="form__fieldset"></fieldset>
      </form>
    </section>
  </body>
</html>
